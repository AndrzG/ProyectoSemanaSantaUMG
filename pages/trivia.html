<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Evaluación Cultural | Chichicastenango</title>
  <link rel="icon" href="https://umg.edu.gt/img/Umg.png" type="image">
  <script src="https://cdn.tailwindcss.com"></script>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Montserrat:wght@800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'umg-blue': '#003366',
            'umg-sky': '#00c1ff',
            'premium-gold': '#D4AF37',
          },
          fontFamily: { sans: ['Inter', 'sans-serif'], lovelo: ['Montserrat', 'sans-serif'] }
        }
      }
    }
  </script>

  <style>
    .font-lovelo {
      font-family: 'Montserrat', sans-serif;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .glass-header {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .fade-in {
      animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Estilo de progreso suave */
    .progress-bar {
      transition: width 0.5s ease-in-out;
    }

    /* Efecto de tarjetas premium */
    .card-shadow {
      box-shadow: 0 20px 50px rgba(0, 51, 102, 0.08);
    }

    /* Botones con micro-interacciones */
    .btn-premium {
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .btn-premium:active {
      transform: scale(0.98);
    }
  </style>
</head>

<body class="bg-slate-50 text-gray-800 font-sans min-h-screen flex flex-col">

  <header class="fixed w-full z-50 glass-header border-b border-gray-100 shadow-sm h-20">
    <div class="max-w-7xl mx-auto h-full px-8 flex justify-between items-center">
      <div class="flex items-center gap-4">
        <a href="../index.html">
          <img src="https://umg.edu.gt/img/Umg.png" alt="UMG Logo"
            class="h-10 md:h-14 transition-transform hover:scale-105">
        </a>
        <div class="hidden md:block h-8 w-px bg-gray-200"></div>
        <span class="hidden md:block text-[10px] font-bold text-umg-blue uppercase tracking-[0.2em]">Facultad de
          Turismo</span>
      </div>
      <a href="../index.html"
        class="group text-umg-blue font-bold text-[10px] uppercase tracking-widest hover:text-umg-sky transition-all flex items-center bg-gray-50 px-4 py-2 rounded-full border border-gray-100">
        <i class="fas fa-arrow-left mr-2 transition-transform group-hover:-translate-x-1"></i> Panel Principal
      </a>
    </div>
  </header>

  <main class="flex-grow flex items-center justify-center p-6 pt-32 pb-16">
    <div id="app-container"
      class="bg-white rounded-[2.5rem] card-shadow w-full max-w-xl overflow-hidden relative border border-white/50 min-h-[500px] flex flex-col">
    </div>
  </main>

  <script>
    const FORMSPREE_URL = 'https://formspree.io/f/xdawpbyb';
    // Contenido validado (Rol Guía Turístico)
    const questions = [
      { q: "¿Días de mercado tradicional?", options: ["Lunes y Viernes", "Martes y Sábados", "Jueves y Domingos", "Miércoles y Domingos"], ans: 2, exp: "El mercado principal ocurre jueves y domingos." },
      { q: "¿Cuántos escalones tiene la Iglesia de Santo Tomás?", options: ["12 escalones", "18 escalones", "20 escalones", "33 escalones"], ans: 1, exp: "Representan los 18 meses del calendario maya Haab." },
      { q: "¿Santo patrono de Chichicastenango?", options: ["San Nicolás", "San Miguel", "Santo Tomás", "San Andrés"], ans: 2, exp: "Se celebra cada 21 de diciembre." },
      { q: "¿Libro sagrado encontrado aquí?", options: ["Chilam Balam", "Popol Vuh", "Códibce Dresde", "Libro de Chilam"], ans: 1, exp: "Fue hallado por Fray Francisco Ximénez." },
      { q: "¿Danza donde se lanzan de un poste alto?", options: ["Danza del Venado", "Danza de Moros", "Palo Volador", "La Conquista"], ans: 2, exp: "Es un ritual de origen prehispánico." }
    ];

    let currentQ = 0, score = 0;
    let userData = { name: '', email: '' };
    const app = document.getElementById('app-container');

    function validateEmail(email) {
      return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
    }

    // --- PANTALLA 1: INGRESO (Rol Publicidad/Marketing) ---
    function renderIntro() {
      app.innerHTML = `
        <div class="p-10 sm:p-14 fade-in text-center flex flex-col h-full justify-center">
          <div class="mb-8">
            <div class="inline-block p-3 bg-blue-50 rounded-2xl mb-4">
              <i class="fas fa-clipboard-check text-umg-blue text-2xl"></i>
            </div>
            <h2 class="text-3xl font-lovelo text-umg-blue">Validación <span class="text-umg-sky">Académica</span></h2>
            <p class="text-gray-400 text-sm mt-2">Ingrese sus credenciales para iniciar la evaluación cultural.</p>
          </div>
          
          <div class="space-y-5 text-left">
            <div class="relative">
              <label class="text-[9px] font-black text-umg-blue uppercase tracking-[0.2em] absolute -top-2 left-4 bg-white px-2">Nombre Completo</label>
              <input type="text" id="userName" class="w-full px-6 py-4 rounded-2xl border-2 border-gray-100 focus:border-umg-sky outline-none transition-all text-sm font-medium placeholder:opacity-30" placeholder="Ej. Juan Pérez">
            </div>
            <div class="relative">
              <label class="text-[9px] font-black text-umg-blue uppercase tracking-[0.2em] absolute -top-2 left-4 bg-white px-2">Correo Electronico</label>
              <input type="email" id="userEmail" class="w-full px-6 py-4 rounded-2xl border-2 border-gray-100 focus:border-umg-sky outline-none transition-all text-sm font-medium placeholder:opacity-30" placeholder="usuario@ejemplo.com">
            </div>
            
            <div id="error-msg" class="text-red-500 text-xs font-bold hidden text-center animate-pulse">
              <i class="fas fa-shield-alt mr-1"></i> Registro ya existente en la base de datos.
            </div>
            
            <button onclick="startTrivia()" class="btn-premium w-full mt-4 bg-umg-blue text-white font-bold py-5 rounded-2xl hover:bg-black shadow-xl shadow-blue-900/10 tracking-widest text-xs">
              INICIAR CERTIFICACIÓN
            </button>
          </div>
        </div>
      `;
    }

    function startTrivia() {
      const name = document.getElementById('userName').value.trim().toUpperCase();
      const email = document.getElementById('userEmail').value.trim().toLowerCase();
      const registrations = JSON.parse(localStorage.getItem('trivia_history') || '[]');

      if (!name || !email) { alert("Complete los campos obligatorios."); return; }
      if (!validateEmail(email)) { alert("Formato de correo inválido."); return; }
      if (registrations.some(r => r.name === name && r.email === email)) {
        document.getElementById('error-msg').classList.remove('hidden'); return;
      }

      userData = { name, email };
      renderQuestion();
    }

    // --- PANTALLA 2: TRIVIA (Rol Programador/UX) ---
    function renderQuestion() {
      const q = questions[currentQ];
      const progress = ((currentQ) / questions.length) * 100;

      app.innerHTML = `
        <div class="w-full h-1.5 bg-gray-100">
          <div class="h-full bg-umg-sky progress-bar" style="width: ${progress}%"></div>
        </div>
        <div class="p-10 sm:p-12 fade-in">
          <div class="flex justify-between items-center mb-8">
            <span class="px-3 py-1 bg-gray-100 rounded-full text-[9px] font-black text-gray-500 uppercase tracking-tighter">Módulo 0${currentQ + 1}</span>
            <div class="text-right">
              <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest">Puntaje Actual</p>
              <p class="text-lg font-black text-umg-blue">${score}<span class="text-xs text-gray-300"> pts</span></p>
            </div>
          </div>
          
          <h3 class="text-xl md:text-2xl font-bold text-gray-900 mb-8 leading-tight">${q.q}</h3>
          
          <div class="grid gap-3" id="options">
            ${q.options.map((o, i) => `
              <button onclick="checkAnswer(${i}, this)" class="btn-premium w-full text-left px-6 py-4 rounded-2xl border-2 border-gray-100 hover:border-umg-sky hover:bg-blue-50/50 transition-all font-semibold text-sm flex justify-between items-center group">
                ${o}
                <i class="fas fa-chevron-right text-[10px] opacity-0 group-hover:opacity-100 transition-all"></i>
              </button>
            `).join('')}
          </div>
          
          <div id="feedback" class="mt-8 hidden rounded-2xl p-5 text-sm border-2 animate-bounce"></div>
          
          <button id="next-btn" onclick="nextQuestion()" class="hidden w-full mt-8 bg-black text-white font-bold py-5 rounded-2xl shadow-lg transition-all tracking-widest text-xs">
            CONTINUAR <i class="fas fa-arrow-right ml-2"></i>
          </button>
        </div>
      `;
    }

    function checkAnswer(idx, btn) {
      const q = questions[currentQ];
      const isCorrect = idx === q.ans;
      document.querySelectorAll('#options button').forEach(b => {
        b.disabled = true;
        b.classList.replace('hover:border-umg-sky', 'opacity-50');
      });

      if (isCorrect) {
        btn.classList.add('border-green-500', 'bg-green-50', 'opacity-100');
        btn.classList.remove('opacity-50');
        score += 20;
      } else {
        btn.classList.add('border-red-500', 'bg-red-50', 'opacity-100');
        btn.classList.remove('opacity-50');
        document.querySelectorAll('#options button')[q.ans].classList.add('border-green-400', 'bg-green-50/50', 'opacity-100');
      }

      const fb = document.getElementById('feedback');
      fb.classList.remove('hidden');
      fb.className = `mt-8 rounded-2xl p-5 text-sm border-2 ${isCorrect ? 'bg-green-50 text-green-800 border-green-200' : 'bg-red-50 text-red-800 border-red-200'}`;
      fb.innerHTML = `
        <div class="flex gap-4">
          <i class="fas ${isCorrect ? 'fa-check-circle' : 'fa-info-circle'} text-xl"></i>
          <div>
            <p class="font-bold uppercase tracking-widest text-[10px] mb-1">${isCorrect ? 'Excelente' : 'Respuesta Correcta'}</p>
            <p class="leading-relaxed">${q.exp}</p>
          </div>
        </div>
      `;
      document.getElementById('next-btn').classList.remove('hidden');
    }

    function nextQuestion() {
      currentQ++;
      if (currentQ < questions.length) renderQuestion();
      else sendTriviaOnly();
    }

    // --- ENVÍO 1 (Rol Programador) ---
    async function sendTriviaOnly() {
      app.innerHTML = `
        <div class="p-20 text-center flex flex-col items-center justify-center grow">
          <div class="w-16 h-16 border-4 border-umg-sky border-t-transparent rounded-full animate-spin mb-6"></div>
          <p class="font-bold text-umg-blue tracking-widest text-xs uppercase">Sincronizando Resultados...</p>
        </div>`;

      try {
        await fetch(FORMSPREE_URL, {
          method: 'POST',
          headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
          body: JSON.stringify({ Tipo: 'Puntaje Trivia', Nombre: userData.name, Email: userData.email, Puntaje: score + "/100" })
        });
        const history = JSON.parse(localStorage.getItem('trivia_history') || '[]');
        history.push(userData);
        localStorage.setItem('trivia_history', JSON.stringify(history));
        renderFeedbackForm();
      } catch (e) { renderFeedbackForm(); }
    }

    // --- PANTALLA 3: FEEDBACK DINÁMICO (Lógica de Evaluación de Grupo) ---
    function renderFeedbackForm() {
      app.innerHTML = `
    <div class="p-10 sm:p-14 fade-in text-center">
      <div class="inline-block px-6 py-2 bg-umg-blue rounded-full mb-6">
        <span class="text-xs font-bold text-white tracking-[0.3em] uppercase">Resultado Final</span>
      </div>
      <div class="mb-8">
        <h2 class="text-6xl font-black text-umg-blue">${score}<span class="text-2xl text-umg-sky">/100</span></h2>
        <p class="text-gray-400 text-[10px] font-bold uppercase tracking-widest mt-2">Certificación de Conocimiento</p>
      </div>
      
      <h2 class="text-lg font-lovelo text-gray-900 mb-8 underline decoration-umg-sky decoration-4 underline-offset-8">Evaluación al Grupo</h2>
      
      <form id="feedback-form" onsubmit="sendFeedback(event)" class="text-left space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div>
            <label class="block text-[9px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Dominio Temático</label>
            <select id="dominio" name="Dominio_Tema" onchange="updateRequirements()" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:border-umg-blue bg-gray-50 text-xs font-bold transition-all" required>
              <option value="" disabled selected>Seleccione una opción...</option>
              <option value="Excelente">Excelente</option>
              <option value="Bueno">Bueno</option>
              <option value="Regular">Regular</option>
            </select>
          </div>
          <div>
            <label class="block text-[9px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1">Interactividad</label>
            <select id="interactividad" name="Material_Visual" onchange="updateRequirements()" class="w-full p-4 rounded-xl border border-gray-200 outline-none focus:border-umg-blue bg-gray-50 text-xs font-bold transition-all" required>
              <option value="" disabled selected>Seleccione una opción...</option>
              <option value="Muy Creativo">Muy Creativo</option>
              <option value="Adecuado">Adecuado</option>
              <option value="Puede mejorar">Puede mejorar</option>
            </select>
          </div>
        </div>
        
        <div id="container-mejora">
          <label id="label-mejora" class="block text-[9px] font-black text-gray-400 uppercase tracking-widest mb-2 ml-1 italic">
            Propuestas de Mejora
          </label>
          <textarea id="mensaje-mejora" name="Mensaje_Mejora" class="w-full p-4 h-28 rounded-xl border border-gray-200 outline-none focus:border-umg-blue bg-gray-50 text-xs font-medium transition-all" placeholder="Seleccione los campos anteriores para habilitar..."></textarea>
        </div>

        <button type="submit" class="btn-premium w-full bg-umg-blue text-white font-bold py-5 rounded-2xl shadow-xl hover:shadow-2xl hover:bg-black transition-all tracking-widest text-xs">
          FINALIZAR PROCESO
        </button>
      </form>
    </div>
  `;
    }

    // --- LÓGICA DE VALIDACIÓN CON SISTEMA DE PROMEDIOS ---
    function updateRequirements() {
      const dominio = document.getElementById('dominio').value;
      const interactividad = document.getElementById('interactividad').value;
      const txtArea = document.getElementById('mensaje-mejora');
      const label = document.getElementById('label-mejora');

      // Asignar valores numéricos a Dominio Temático
      let valorDominio = 0;
      if (dominio === "Excelente") valorDominio = 3;
      else if (dominio === "Bueno") valorDominio = 2;
      else if (dominio === "Regular") valorDominio = 1;

      // Asignar valores numéricos a Interactividad
      let valorInteractividad = 0;
      if (interactividad === "Muy Creativo") valorInteractividad = 3;
      else if (interactividad === "Adecuado") valorInteractividad = 2;
      else if (interactividad === "Puede mejorar") valorInteractividad = 1;

      // Esperar a que el usuario seleccione ambas opciones para calcular
      if (valorDominio === 0 || valorInteractividad === 0) return;

      // Calcular el punto medio
      const promedio = (valorDominio + valorInteractividad) / 2;

      // Evaluar el resultado general según el promedio
      if (promedio <= 1.5) {
        // CASO OBLIGATORIO: Promedio de 1 o 1.5 (Resultado bajo)
        txtArea.required = true;
        txtArea.placeholder = "Por favor, justifique cómo podemos mejorar. Su opinión es importante para nosotros.";
        label.innerHTML = "Propuestas de Mejora <span class='text-red-500 font-black'>(OBLIGATORIO)</span>";
        label.classList.remove('text-gray-400', 'text-green-500', 'text-blue-500');
        label.classList.add('text-red-500');
      }
      else if (promedio === 3) {
        // CASO EXCELENTE: Promedio de 3 (Resultado perfecto)
        txtArea.required = false;
        txtArea.placeholder = "¡Muchas gracias! Si tiene algún comentario adicional para el grupo, es bienvenido.";
        label.innerHTML = "Propuestas de Mejora <span class='text-green-500 font-black'>(¡GRACIAS!)</span>";
        label.classList.remove('text-gray-400', 'text-red-500', 'text-blue-500');
        label.classList.add('text-green-500');
      }
      else {
        // CASO MEDIO: Promedio de 2 o 2.5 (Resultado aceptable)
        txtArea.required = false;
        txtArea.placeholder = "Gracias por su calificación. Le sugerimos darnos un comentario para seguir mejorando.";
        label.innerHTML = "Propuestas de Mejora <span class='text-blue-500 font-black'>(SUGERIDO)</span>";
        label.classList.remove('text-red-500', 'text-green-500', 'text-gray-400');
        label.classList.add('text-blue-500');
      }
    }

    async function sendFeedback(e) {
      e.preventDefault();
      const btn = e.target.querySelector('button');
      btn.innerHTML = '<i class="fas fa-sync fa-spin mr-2"></i> PROCESANDO...';
      btn.disabled = true;

      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());

      try {
        await fetch(FORMSPREE_URL, {
          method: 'POST',
          headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' },
          body: JSON.stringify({ Tipo: 'Feedback Exposición', Nombre: userData.name, Email: userData.email, ...data })
        });
        showFinalThanks();
      } catch (err) { alert("Error de conexión."); btn.disabled = false; btn.innerText = 'FINALIZAR PROCESO'; }
    }

    // --- PANTALLA FINAL (Rol Publicidad) ---
    function showFinalThanks() {
      app.innerHTML = `
        <div class="p-14 text-center fade-in flex flex-col items-center justify-center grow">
          <div class="w-24 h-24 bg-green-50 text-green-500 rounded-full flex items-center justify-center mb-8 animate-pulse">
            <i class="fas fa-check text-4xl"></i>
          </div>
          <h2 class="text-3xl font-lovelo text-umg-blue mb-4 text-balance">¡Evaluación Completada!</h2>
          <p class="text-gray-500 text-sm leading-relaxed mb-10 max-w-xs mx-auto">
            Estimado(a) <span class="font-bold text-gray-900">${userData.name}</span>, su feedback ha sido integrado exitosamente en nuestro reporte de calidad académica.
          </p>
          <div class="space-y-2">
            <div class="h-1 w-12 bg-umg-sky mx-auto rounded-full"></div>
            <p class="text-[9px] text-gray-400 uppercase tracking-[0.3em]">Redirigiendo al sistema central</p>
          </div>
        </div>
      `;
      setTimeout(() => { window.location.href = '../index.html'; }, 5000);
    }

    renderIntro();
  </script>
</body>

</html>
